version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: etl-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: etl-pipeline
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    restart: "no"

volumes:
  mongo_data:
